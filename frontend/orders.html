<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders - ShopNow</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <header class="navbar" id="navbar"></header>

  <main>
    <div class="container" style="padding-top:2rem;padding-bottom:4rem">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem">
        <h1><i class="fas fa-box" style="color:var(--primary);margin-right:0.5rem"></i> My Orders</h1>
        <a href="products.html" class="btn btn-outline btn-sm"><i class="fas fa-shopping-bag"></i> Continue Shopping</a>
      </div>

      <!-- Empty State -->
      <div id="ordersEmpty" class="cart-empty" style="display:none">
        <i class="fas fa-box-open"></i>
        <h3>No orders yet</h3>
        <p style="color:var(--text-muted);margin-top:0.5rem">When you place an order, it will appear here</p>
        <a href="products.html" class="btn btn-primary" style="margin-top:1.5rem"><i class="fas fa-shopping-bag"></i> Start Shopping</a>
      </div>

      <!-- Orders List -->
      <div id="ordersList"></div>
    </div>
  </main>

  <!-- Order Detail Modal -->
  <div class="modal-overlay" id="orderDetailModal" onclick="if(event.target===this)closeOrderModal()">
    <div class="modal" style="max-width:600px">
      <div class="modal-header">
        <h3>Order Details</h3>
        <button class="modal-close" onclick="closeOrderModal()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body" id="orderDetailBody" style="max-height:70vh;overflow-y:auto">
        <div class="loading-overlay"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <footer class="footer" id="footer"></footer>
  <div id="toastContainer" class="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/orders.js"></script>
</body>
</html>
