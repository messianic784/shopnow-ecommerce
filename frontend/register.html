<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - ShopNow</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body data-page="register">
  <header class="navbar" id="navbar"></header>

  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <i class="fas fa-shopping-bag"></i>
        <h2>Create Account</h2>
        <p>Join ShopNow and start shopping today</p>
      </div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="name">Full Name</label>
          <div class="input-group">
            <i class="fas fa-user input-group-icon"></i>
            <input type="text" id="name" class="form-control" placeholder="John Doe" autocomplete="name" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-group">
            <i class="fas fa-envelope input-group-icon"></i>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" autocomplete="email" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-group" style="position:relative">
            <i class="fas fa-lock input-group-icon"></i>
            <input type="password" id="password" class="form-control" placeholder="Min 6 characters" autocomplete="new-password" required>
            <button type="button" class="toggle-password" data-target="password" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;padding:0">
              <i class="fas fa-eye-slash"></i>
            </button>
          </div>
          <div class="form-hint">At least 6 characters</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <div class="input-group" style="position:relative">
            <i class="fas fa-lock input-group-icon"></i>
            <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat password" autocomplete="new-password" required>
            <button type="button" class="toggle-password" data-target="confirmPassword" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;padding:0">
              <i class="fas fa-eye-slash"></i>
            </button>
          </div>
        </div>

        <div style="margin-bottom:1.25rem">
          <label style="display:flex;align-items:flex-start;gap:0.6rem;cursor:pointer;font-size:0.88rem;color:var(--text-muted)">
            <input type="checkbox" id="terms" required style="margin-top:3px;accent-color:var(--primary)">
            I agree to the <a href="#" style="font-weight:600">Terms of Service</a> and <a href="#" style="font-weight:600">Privacy Policy</a>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html" style="font-weight:600">Sign in</a>
      </div>
    </div>
  </main>

  <div id="toastContainer" class="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Override register to check terms checkbox
    document.getElementById('registerForm').addEventListener('submit', (e) => {
      if (!document.getElementById('terms').checked) {
        e.stopImmediatePropagation();
        showToast('Please accept the terms and conditions', 'warning');
        e.preventDefault();
      }
    }, true);
  </script>
</body>
</html>
